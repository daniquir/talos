services:
  # LAYER 1: The Web (Public)
  talos-web:
    build: ./talos-web
    container_name: talos-web
    ports:
      - "3000:3000"
      - "3443:3443"
    environment:
      - DEBUG=false
      - DATABASE_URL=sqlite:/data/talos.db
    volumes:
      - ./data/web:/data
    networks:
      - net_public  # Accessible from your browser
      - net_middleware # Secure channel to Storage
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # LAYER 2: The Storage (The Bridge)
  talos-storage:
    build: ./talos-storage
    container_name: talos-storage
    environment:
      - GPG_ID=${GPG_ID}
      - DEBUG=false
      - SHARED_SECRET=${SHARED_SECRET:-changeme_in_production}
    volumes:
      - ./data/password-store:/home/talosuser/.password-store:rw
      - ./config:/app/config:ro
      - ./data/ssh/id_rsa_talos:/run/secrets/id_rsa_talos:ro # Mount your SSH key for Git
    networks:
      - net_middleware # Only accepts requests from Web
      - net_private    # Exclusive channel to Bunker
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:mode=1777 # Writable tmpfs for git operations
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # LAYER 3: The Bunker (Totally Isolated)
  talos-bunker:
    build: ./talos-bunker
    container_name: talos-bunker
    environment:
      - GPG_ID=${GPG_ID}
      - DEBUG=false
      - SHARED_SECRET=${SHARED_SECRET:-changeme_in_production}
    networks:
      - net_private # Only sees Storage, no one else sees it
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/process"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

secrets:
  id_rsa_talos:
    file: ./data/ssh/id_rsa_talos

networks:
  # This network does NOT have 'internal: true', allowing port mapping
  net_public:
    driver: bridge

  # Isolates Web-Storage communication from outside world
  net_middleware:
    internal: true

  # This network IS internal. The Bunker is in a digital black hole.
  net_private:
    internal: true